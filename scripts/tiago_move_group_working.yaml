/move_group:
  ros__parameters:
    use_sim_time: false
    robot_description_timeout: 60.0
    publish_robot_description_semantic: true
    publish_planning_scene: true
    publish_geometry_updates: true
    publish_state_updates: true
    publish_transforms_updates: true
    publish_robot_description: true
    robot_description: |
      <?xml version="1.0"?>
      <robot name="tiago_minimal">
        <link name="base_footprint"/>
        <link name="base_link"/>
        <joint name="base_footprint_joint" type="fixed">
          <parent link="base_footprint"/>
          <child link="base_link"/>
          <origin xyz="0 0 0" rpy="0 0 0"/>
        </joint>
        <link name="torso_lift_link"/>
        <joint name="torso_lift_joint" type="prismatic">
          <parent link="base_link"/>
          <child link="torso_lift_link"/>
          <origin xyz="0 0 0.6" rpy="0 0 0"/>
          <axis xyz="0 0 1"/>
          <limit lower="0.0" upper="0.35" effort="2000" velocity="0.07"/>
        </joint>
        <link name="arm_1_link"/>
        <joint name="arm_1_joint" type="revolute">
          <parent link="torso_lift_link"/>
          <child link="arm_1_link"/>
          <origin xyz="0.155 0.014 -0.151" rpy="0 0 -1.5708"/>
          <axis xyz="0 0 1"/>
          <limit lower="-2.9" upper="2.9" effort="43" velocity="2.0"/>
        </joint>
        <link name="arm_2_link"/>
        <joint name="arm_2_joint" type="revolute">
          <parent link="arm_1_link"/>
          <child link="arm_2_link"/>
          <origin xyz="0.125 0.0195 -0.031" rpy="1.5708 0 0"/>
          <axis xyz="0 0 1"/>
          <limit lower="-2.0" upper="2.0" effort="43" velocity="2.0"/>
        </joint>
        <link name="arm_3_link"/>
        <joint name="arm_3_joint" type="revolute">
          <parent link="arm_2_link"/>
          <child link="arm_3_link"/>
          <origin xyz="0.0895 0 -0.0015" rpy="-1.5708 0 1.5708"/>
          <axis xyz="0 0 1"/>
          <limit lower="-3.6" upper="1.8" effort="26" velocity="2.4"/>
        </joint>
        <link name="arm_4_link"/>
        <joint name="arm_4_joint" type="revolute">
          <parent link="arm_3_link"/>
          <child link="arm_4_link"/>
          <origin xyz="-0.162 0.02 0.027" rpy="-1.5708 -1.5708 0"/>
          <axis xyz="0 0 1"/>
          <limit lower="-0.8" upper="2.5" effort="26" velocity="2.4"/>
        </joint>
        <link name="arm_5_link"/>
        <joint name="arm_5_joint" type="revolute">
          <parent link="arm_4_link"/>
          <child link="arm_5_link"/>
          <origin xyz="0 0 0.15" rpy="1.5708 -1.5708 -1.5708"/>
          <axis xyz="0 0 1"/>
          <limit lower="-2.2" upper="2.2" effort="6.6" velocity="2.0"/>
        </joint>
        <link name="arm_6_link"/>
        <joint name="arm_6_joint" type="revolute">
          <parent link="arm_5_link"/>
          <child link="arm_6_link"/>
          <origin xyz="0 0 0.12" rpy="0 -1.5708 -1.5708"/>
          <axis xyz="0 0 1"/>
          <limit lower="-1.5" upper="1.5" effort="6.6" velocity="2.0"/>
        </joint>
        <link name="arm_7_link"/>
        <joint name="arm_7_joint" type="revolute">
          <parent link="arm_6_link"/>
          <child link="arm_7_link"/>
          <origin xyz="0 0 0.05" rpy="1.5708 0 1.5708"/>
          <axis xyz="0 0 1"/>
          <limit lower="-2.2" upper="2.2" effort="6.6" velocity="2.0"/>
        </joint>
        <link name="arm_tool_link"/>
        <joint name="arm_tool_joint" type="fixed">
          <parent link="arm_7_link"/>
          <child link="arm_tool_link"/>
          <origin xyz="0 0 0.05" rpy="0 0 0"/>
        </joint>
        <link name="gripper_left_link"/>
        <joint name="gripper_left_left_finger_joint" type="prismatic">
          <parent link="arm_tool_link"/>
          <child link="gripper_left_link"/>
          <origin xyz="0 0 0" rpy="0 0 0"/>
          <axis xyz="0 1 0"/>
          <limit lower="0.0" upper="0.045" effort="100" velocity="0.1"/>
        </joint>
        <link name="gripper_right_link"/>
        <joint name="gripper_right_left_finger_joint" type="prismatic">
          <parent link="arm_tool_link"/>
          <child link="gripper_right_link"/>
          <origin xyz="0 0 0" rpy="0 0 0"/>
          <axis xyz="0 -1 0"/>
          <limit lower="0.0" upper="0.045" effort="100" velocity="0.1"/>
        </joint>
        <link name="head_1_link"/>
        <joint name="head_1_joint" type="revolute">
          <parent link="torso_lift_link"/>
          <child link="head_1_link"/>
          <origin xyz="0.18 0 0.0" rpy="0 0 0"/>
          <axis xyz="0 0 1"/>
          <limit lower="-1.4" upper="1.4" effort="5.2" velocity="3.0"/>
        </joint>
        <link name="head_2_link"/>
        <joint name="head_2_joint" type="revolute">
          <parent link="head_1_link"/>
          <child link="head_2_link"/>
          <origin xyz="0.005 0 0.098" rpy="1.5708 0 0"/>
          <axis xyz="0 0 1"/>
          <limit lower="-1.2" upper="0.9" effort="2.8" velocity="3.0"/>
        </joint>
      </robot>
    robot_description_semantic: |
      <?xml version="1.0"?>
      <robot name="tiago_minimal">
        <group name="arm">
          <joint name="arm_1_joint"/>
          <joint name="arm_2_joint"/>
          <joint name="arm_3_joint"/>
          <joint name="arm_4_joint"/>
          <joint name="arm_5_joint"/>
          <joint name="arm_6_joint"/>
          <joint name="arm_7_joint"/>
          <joint name="arm_tool_joint"/>
        </group>
        <group name="arm_torso">
          <joint name="torso_lift_joint"/>
          <joint name="arm_1_joint"/>
          <joint name="arm_2_joint"/>
          <joint name="arm_3_joint"/>
          <joint name="arm_4_joint"/>
          <joint name="arm_5_joint"/>
          <joint name="arm_6_joint"/>
          <joint name="arm_7_joint"/>
          <joint name="arm_tool_joint"/>
        </group>
        <group name="gripper">
          <joint name="gripper_left_left_finger_joint"/>
          <joint name="gripper_right_left_finger_joint"/>
        </group>
      </robot>
    robot_description_kinematics:
      arm_torso:
        kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
        kinematics_solver_search_resolution: 0.005
        kinematics_solver_timeout: 0.05
        kinematics_solver_attempts: 3
      arm:
        kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
        kinematics_solver_search_resolution: 0.005
        kinematics_solver_timeout: 0.05
        kinematics_solver_attempts: 3
    planning_pipelines: [ompl]
    default_planning_pipeline: ompl
    ompl:
      planning_plugin: ompl_interface/OMPLPlanner
      request_adapters: >-
        default_planner_request_adapters/AddTimeOptimalParameterization
        default_planner_request_adapters/ResolveConstraintFrames
        default_planner_request_adapters/FixWorkspaceBounds
        default_planner_request_adapters/FixStartStateBounds
        default_planner_request_adapters/FixStartStateCollision
        default_planner_request_adapters/FixStartStatePathConstraints
      start_state_max_bounds_error: 0.1
      planner_configs:
        RRTConnectkConfigDefault:
          type: geometric::RRTConnect
      arm_torso:
        planner_configs: [RRTConnectkConfigDefault]
        projection_evaluator: joints(torso_lift_joint,arm_1_joint)
        longest_valid_segment_fraction: 0.01
    moveit_controller_manager: moveit_simple_controller_manager/MoveItSimpleControllerManager
    trajectory_execution:
      allowed_start_tolerance: 0.5
      execution_duration_monitoring: false
      allowed_goal_duration_margin: 5.0
      wait_for_trajectory_completion: true
    # Allow MoveGroup to proceed even without fresh joint states.
    current_state_monitor_timeout: 30.0
    publish_transforms_updates: true
    moveit_simple_controller_manager:
      controller_names: [arm_controller, torso_controller, gripper_controller]
      arm_controller:
        action_ns: follow_joint_trajectory
        type: FollowJointTrajectory
        default: true
        joints: [arm_1_joint, arm_2_joint, arm_3_joint, arm_4_joint, arm_5_joint, arm_6_joint, arm_7_joint]
      torso_controller:
        action_ns: follow_joint_trajectory
        type: FollowJointTrajectory
        default: true
        joints: [torso_lift_joint]
      gripper_controller:
        action_ns: follow_joint_trajectory
        type: FollowJointTrajectory
        default: true
        joints: [gripper_left_left_finger_joint, gripper_right_left_finger_joint]
