# RMPFlow configuration for TIAGo right arm.
# Based on NVIDIA's UR10e rmpflow_common.yaml template,
# adapted for TIAGo's 8-DOF chain (torso + 7-DOF arm).

joint_limit_buffers: [0.01, 0.01, 0.01, 0.01, 0.01, 0.01, 0.01, 0.01]

rmp_params:
  cspace_target_rmp:
    metric_scalar: 50.0
    position_gain: 80.0
    damping_gain: 40.0
    robust_position_term_thresh: 0.5
    inertia: 1.0
  cspace_trajectory_rmp:
    p_gain: 80.0
    d_gain: 10.0
    ff_gain: 0.25
    weight: 50.0
  cspace_affine_rmp:
    final_handover_time_std_dev: 0.25
    weight: 2000.0
  joint_limit_rmp:
    metric_scalar: 1000.0
    metric_length_scale: 0.01
    metric_exploder_eps: 0.001
    metric_velocity_gate_length_scale: 0.01
    accel_damper_gain: 200.0
    accel_potential_gain: 1.0
    accel_potential_exploder_length_scale: 0.1
    accel_potential_exploder_eps: 0.01
  joint_velocity_cap_rmp:
    max_velocity: 0.8
    velocity_damping_region: 0.3
    damping_gain: 1000.0
    metric_weight: 100.0
  target_rmp:
    accel_p_gain: 25.0
    accel_d_gain: 70.0
    accel_norm_eps: 0.075
    metric_alpha_length_scale: 0.05
    min_metric_alpha: 0.01
    max_metric_scalar: 10000.0
    min_metric_scalar: 2500.0
    proximity_metric_boost_scalar: 20.0
    proximity_metric_boost_length_scale: 0.02
    xi_estimator_gate_std_dev: 20000.0
    accept_user_weights: false
  axis_target_rmp:
    accel_p_gain: 180.0
    accel_d_gain: 50.0
    metric_scalar: 10.0
    proximity_metric_boost_scalar: 3000.0
    proximity_metric_boost_length_scale: 0.08
    xi_estimator_gate_std_dev: 20000.0
    accept_user_weights: false
  collision_rmp:
    damping_gain: 50.0
    damping_std_dev: 0.04
    damping_robustness_eps: 0.01
    damping_velocity_gate_length_scale: 0.01
    repulsion_gain: 800.0
    repulsion_std_dev: 0.01
    metric_modulation_radius: 0.5
    metric_scalar: 10000.0
    metric_exploder_std_dev: 0.02
    metric_exploder_eps: 0.001
  damping_rmp:
    accel_d_gain: 30.0
    metric_scalar: 50.0
    inertia: 100.0

canonical_resolve:
  max_acceleration_norm: 40.0
  projection_tolerance: 0.01
  verbose: false

body_cylinders:
  - name: torso
    pt1: [0, 0, 0.10]
    pt2: [0, 0, 0.0]
    radius: 0.25

body_collision_controllers:
  - name: arm_right_tool_link
    radius: 0.06
