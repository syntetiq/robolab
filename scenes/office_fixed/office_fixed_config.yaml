    friction_dynamic: 0.3
    restitution: 0.01

lights:
  dome:
    intensity: 400.0
    color: [1.0, 0.98, 0.95]
    texture: ""
  ceiling:
    count: 6
    intensity: 2500.0
    color: [1.0, 0.98, 0.94]
    width: 0.8
    height: 0.4
    z: 5.45
    positions:
      - [-3.0, 1.0]
      - [0.0, 1.0]
      - [3.0, 1.0]
      - [-3.0, -1.5]
      - [0.0, -1.5]
      - [3.0, -1.5]
  # Sunlight through east windows
  window_lights:
    intensity: 4000.0
    color: [1.0, 0.96, 0.88]
    width: 1.20
    height: 1.00

cameras:
  top:
    position: [0.0, 0.0, 8.0]
    target: [0.0, 2.0, 0.75]
  front:
    position: [0.0, -2.5, 1.5]
    target: [0.0, 2.0, 0.75]
  isometric:
    position: [-5.0, -2.5, 4.0]
    target: [0.0, 2.0, 0.75]

robot:
  start_x: 0.0
  start_y: 0.0
  start_z: 0.0
