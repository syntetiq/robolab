    friction_dynamic: 0.6
    restitution: 0.01

  book_cover:
    diffuse: [0.10, 0.15, 0.45]
    roughness: 0.60
    metallic: 0.0
    friction_static: 0.6
    friction_dynamic: 0.4
    restitution: 0.01

  shelf_metal:
    diffuse: [0.70, 0.70, 0.75]
    roughness: 0.30
    metallic: 0.65

  ceiling_tile:
    diffuse: [0.94, 0.94, 0.92]
    roughness: 0.75
    metallic: 0.0

  ceiling_rail:
    diffuse: [0.85, 0.85, 0.82]
    roughness: 0.40
    metallic: 0.30

  door_wood:
    diffuse: [0.65, 0.50, 0.35]
    roughness: 0.50
