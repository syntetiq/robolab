# office_fixed_config.yaml — Fixed open-space office scene for TIAGo manipulation
# All dimensions in meters, angles in degrees, colors as [R, G, B] 0-1.

room:
  size_x: 10.0
  size_y: 8.0
  wall_height: 5.6
  wall_thickness: 0.15
  floor_thickness: 0.02

# Furniture layout:
#   North wall (Y=+3.85 inner): cabinet, whiteboard
#   South wall: door (centered at X=-2.0)
#   East wall: 2 windows
#   Center area: 3 desks, 1 chair
#   East side: printer stand
#   Robot spawns at origin, facing +Y (north)

furniture:
  desk_main:
    width: 1.60
    depth: 0.80
    height: 0.75
    top_thickness: 0.03
    leg_width: 0.05
    center_x: 0.0
    center_y: 2.0
    material: desk_wood

  desk_side:
    width: 1.40
    depth: 0.70
    height: 0.75
    top_thickness: 0.03
    leg_width: 0.05
    center_x: 3.0
    center_y: 2.0
    material: desk_wood

  desk_back:
    width: 1.60
    depth: 0.80
    height: 0.75
    top_thickness: 0.03
    leg_width: 0.05
    center_x: -3.0
    center_y: 3.0
    material: desk_wood

  chair:
    seat_w: 0.45
    seat_d: 0.45
    seat_h: 0.45
    seat_thickness: 0.04
    back_h: 0.40
    back_thickness: 0.03
    leg_width: 0.04
    center_x: 0.0
    center_y: 0.8
    material: chair_fabric

  cabinet:
    width: 0.90
    depth: 0.50
    height: 1.80
    center_x: -4.0
    center_y: 3.60
    door_thickness: 0.025
    door_mass_kg: 1.5
    door_open_deg: 90.0
    shelf_count: 3
    handle:
      type: vertical
      length: 0.30
      width: 0.025
      depth: 0.025
      standoff: 0.035
      center_height: 1.00
      graspable_section: 0.15
    material: cabinet_laminate
    door_material: cabinet_door
    handle_material: handle_metal

  whiteboard:
    width: 1.80
    height: 1.20
    thickness: 0.03
    center_x: 0.0
    mount_height: 1.20
    material: whiteboard_surface

  printer_stand:
    width: 0.60
    depth: 0.50
    height: 0.65
    top_thickness: 0.025
    leg_width: 0.04
    center_x: 3.5
    center_y: 3.60
    material: cabinet_laminate

# --- Architectural elements ---

door:
  wall: south
  center_x: -2.0
  width: 0.90
  height: 2.10
  thickness: 0.04
  frame_width: 0.08
  frame_depth: 0.06
  mass_kg: 8.0
  open_deg: 90.0
  handle:
    type: lever
    length: 0.12
    width: 0.02
    depth: 0.04
    standoff: 0.03
    center_height: 1.05
  material: door_wood
  frame_material: door_frame
  handle_material: handle_metal

windows:
  - wall: east
    center_y: 1.5
    width: 1.40
    height: 1.20
    sill_height: 0.90          # bottom of glass from floor
    frame_width: 0.06
    frame_depth: 0.04
    glass_thickness: 0.008
    material: window_glass
    frame_material: window_frame
    sill_material: window_sill
  - wall: east
    center_y: -1.5
    width: 1.40
    height: 1.20
    sill_height: 0.90
    frame_width: 0.06
    frame_depth: 0.04
    glass_thickness: 0.008
    material: window_glass
    frame_material: window_frame
    sill_material: window_sill

baseboard:
  height: 0.08
  thickness: 0.012
  material: baseboard_white

ceiling_grid:
  tile_size: 0.60
  rail_width: 0.02
  rail_depth: 0.025
  drop: 0.10                  # how far below wall_height the grid hangs
  material: ceiling_tile
  rail_material: ceiling_rail

outlets:
  - wall: north
    center_x: 2.5
    center_z: 0.30
  - wall: south
    center_x: 1.0
    center_z: 0.30
  - wall: east
    center_y: 0.0
    center_z: 0.30
  - wall: west
    center_y: 1.0
    center_z: 0.30
  - wall: west
    center_y: -1.5
    center_z: 0.30
outlet_size:
  width: 0.07
  height: 0.11
  depth: 0.005
  material: plastic_white

cable_trunking:
  width: 0.04
  height: 0.025
  segments:
    - from: [0.0, 1.60]       # desk_main back edge
      to: [0.0, 3.85]         # north wall
      z: 0.02                 # floor level
    - from: [3.0, 1.65]       # desk_side back edge
      to: [4.85, 1.65]        # east wall
      z: 0.02
  material: cable_trunking

chair_mat:
  radius: 0.55
  thickness: 0.005
  center_x: 0.0
  center_y: 0.8
  material: chair_mat_plastic

objects:
  mug:
    type: cylinder
    radius: 0.04
    height: 0.10
    mass_kg: 0.25
    on: desk_main
    offset_x: 0.30
    offset_y: 0.0
    material: mug_ceramic

  stapler:
    type: box
    sx: 0.06
    sy: 0.18
    sz: 0.06
    mass_kg: 0.30
    on: desk_main
    offset_x: -0.25
    offset_y: 0.15
    material: plastic_black

  book:
    type: box
    sx: 0.15
    sy: 0.22
    sz: 0.03
    mass_kg: 0.40
    on: desk_side
    offset_x: 0.0
    offset_y: 0.0
    material: book_cover

  pen_holder:
    type: cylinder
    radius: 0.035
    height: 0.10
    mass_kg: 0.15
    on: desk_main
    offset_x: -0.40
    offset_y: -0.10
    material: plastic_dark

